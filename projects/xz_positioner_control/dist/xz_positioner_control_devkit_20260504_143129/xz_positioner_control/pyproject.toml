[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "xz-positioner-control"
version = "0.1.0"
description = "XZ linear positioner RF measurement control UI"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "PySide6==6.7.2",
  "pyqtgraph==0.13.7"
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
